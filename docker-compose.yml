services:
  postgres:
    image: postgres:16
    container_name: peer_review_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: peer_review_user
      POSTGRES_PASSWORD: peer_review_password
      POSTGRES_DB: peer_review_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
